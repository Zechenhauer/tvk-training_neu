<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Kapellen 1919 - Trainingsplaner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #121214; color: #e2e8f0; }
        .card { background-color: #1a1a1e; border: 1px solid #2d2d34; }
        .btn-ja { background-color: #16a34a; }
        .btn-nein { background-color: #dc2626; }
        .active-ja { background-color: #16a34a !important; box-shadow: 0 0 12px #16a34a; }
        .active-nein { background-color: #dc2626 !important; box-shadow: 0 0 12px #dc2626; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto font-sans">

    <div class="text-center my-6">
        <div class="inline-block bg-yellow-500 text-black font-bold text-xs px-3 py-1 rounded-full uppercase tracking-wider mb-2">TV Kapellen 1919</div>
        <h1 class="text-2xl font-extrabold tracking-tight text-white flex items-center justify-center gap-2">
            <i class="fa-solid text-yellow-500 fa-bullseye"></i> Trainings-Planer
        </h1>
    </div>

    <div id="profile-section" class="card rounded-2xl p-5 mb-6">
        <div id="login-view">
            <input type="text" id="username-input" placeholder="Name eingeben..." class="w-full bg-[#24242b] border border-[#3f3f46] p-3 rounded-xl text-white mb-2">
            <button onclick="saveProfile()" class="w-full bg-yellow-500 text-black font-bold py-3 rounded-xl">Anmelden</button>
        </div>
        <div id="user-view" class="hidden flex justify-between items-center">
            <span id="current-user" class="font-bold"></span>
            <button onclick="logout()" class="text-xs text-gray-400">Abmelden</button>
        </div>
    </div>

    <div id="main-content" class="hidden space-y-3 mb-8">
        <div id="days-container" class="space-y-3"></div>
    </div>

    <div id="loading-overlay" class="fixed inset-0 bg-black/80 hidden flex-col items-center justify-center z-50">
        <div class="animate-spin rounded-full h-12 w-12 border-4 border-yellow-500 border-t-transparent"></div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzTlZAlmexyAtbr-nnD7sXhxm9Xjy55caJuivRvk7twKjuwys_1c5_CGVZu8vWbteuWag/exec";
        let currentUser = localStorage.getItem("darts_username") || "";
        let weekDates = [];

        function initWeekDates() {
            let monday = new Date();
            let day = monday.getDay();
            monday.setDate(monday.getDate() - (day === 0 ? 6 : day - 1));
            for (let i = 0; i < 5; i++) {
                let d = new Date(monday);
                d.setDate(monday.getDate() + i);
                weekDates.push(d.toISOString().split('T')[0]);
            }
        }

        async function submit(datum, status) {
            let uhrzeit = document.getElementById('time-' + datum).value;
            document.getElementById("loading-overlay").style.display = "flex";
            
            await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({ datum, spieler: currentUser, status, uhrzeit })
            });
            window.location.reload();
        }

        function saveProfile() {
            currentUser = document.getElementById("username-input").value;
            localStorage.setItem("darts_username", currentUser);
            renderApp();
        }

        function logout() { localStorage.removeItem("darts_username"); location.reload(); }

        function renderApp() {
            if (!currentUser) {
                document.getElementById("login-view").classList.remove("hidden");
            } else {
                document.getElementById("login-view").classList.add("hidden");
                document.getElementById("user-view").classList.remove("hidden");
                document.getElementById("main-content").classList.remove("hidden");
                document.getElementById("current-user").innerText = currentUser;
                renderDays();
            }
        }

        function renderDays() {
            const container = document.getElementById("days-container");
            weekDates.forEach(date => {
                let div = document.createElement("div");
                div.className = "flex justify-between p-3 rounded-xl bg-[#24242b]";
                div.innerHTML = `<div>${date}</div>
                    <input type="time" id="time-${date}" class="bg-black p-1 text-white">
                    <button onclick="submit('${date}', 'ja')" class="bg-green-700 px-2 py-1 rounded">Ja</button>`;
                container.appendChild(div);
            });
        }

        initWeekDates();
        renderApp();
    </script>
</body>
</html>
